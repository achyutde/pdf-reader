<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>PDF Reader</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <h1>📖 PDF Reader</h1>
  <button class="top-btn">Open PDF</button>
  <button class="top-btn sec" id="bm-btn"    disabled>🔖 Bookmarks</button>
  <button class="top-btn sec" id="saveb"     disabled>🔖 Save</button>
  <button class="top-btn sec" id="view-btn"  disabled>↔ Fit Width</button>
  <button class="top-btn sec" id="focus-btn" disabled>⛶ Focus</button>
  <input type="file" id="file-input" accept="application/pdf" />
  <div id="page-jump">
    <input type="number" id="pg-input" min="1" placeholder="—" />
    <button class="top-btn sec">Go</button>
    <span id="page-total">/ —</span>
  </div>
</div>

<!-- Resume banner -->
<div id="resume-bar">
  <p id="resume-msg">Resume where you left off?</p>
  <button class="rb-btn" id="rb-yes">Resume</button>
  <button class="rb-btn" id="rb-no">Start fresh</button>
</div>

<!-- Exit focus FAB (top-right) -->
<button id="fab" title="Exit focus mode">⊟</button>

<!-- Play/Pause FAB (bottom-right, focus mode) -->
<button id="fab-play" title="Play / Pause">▶</button>

<!-- Edge page nav buttons (focus mode) -->
<button class="edge-btn" id="edge-prev" title="Previous page">◀</button>
<button class="edge-btn" id="edge-next" title="Next page">▶</button>

<!-- Scrollable content -->
<div id="content">
  <div id="drop-zone">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <p>Tap <strong>Open PDF</strong> above<br/>to load a file from your Files app</p>
  </div>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="hl-canvas"></canvas>
    </div>
    <div id="tap-hint">👆 Tap any sentence to start reading from there</div>
  </div>
</div>

<!-- Sentence ticker -->
<div id="ticker"></div>

<!-- Controls -->
<div id="controls">
  <div class="ctrl-row">
    <button class="cb" id="prev-pg"   disabled>◀ Page</button>
    <button class="cb" id="prev-sent" disabled>⏮</button>
    <button class="cb" id="playb"     disabled>▶ Read</button>
    <button class="cb" id="next-sent" disabled>⏭</button>
    <button class="cb" id="next-pg"   disabled>Page ▶</button>
  </div>
  <div class="ctrl-row">
    <span id="speed-lbl">Speed: <strong id="speed-val">1.0×</strong></span>
    <input type="range" id="speed-range" min="0.5" max="2.5" step="0.1" value="1" />
    <select id="voice-sel">
      <option value="">Default Voice</option>
    </select>
  </div>
</div>

<!-- Bookmarks sheet -->
<div id="bm-bg">
  <div id="bm-sheet">
    <div id="bm-head">
      <h2>🔖 Bookmarks</h2>
      <button class="bm-io-btn" title="Import bookmarks">⬆ Import</button>
      <button class="bm-io-btn" title="Export bookmarks">⬇ Export</button>
      <input type="file" id="bm-import-input" accept="application/json" style="display:none" />
      <button id="bm-x">✕</button>
    </div>
    <div id="bm-items"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
