<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>PDF Reader</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ═══ TOP BAR ═══ */
    #topbar {
      background: #16213e;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      z-index: 200;
      transition: transform 0.28s ease;
    }
    body.reading #topbar { transform: translateY(-110%); }

    #topbar h1 { font-size: 17px; font-weight: 700; color: #e94560; flex-shrink: 0; }

    .top-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .top-btn.sec { background: #0f3460; }
    .top-btn:active { opacity: 0.7; }
    .top-btn:disabled { opacity: 0.3; cursor: default; }

    #file-input { display: none; }

    #page-jump {
      display: none;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex-shrink: 0;
    }
    #page-jump.on { display: flex; }
    #page-jump input {
      width: 52px;
      background: #0f3460;
      color: white;
      border: 1px solid #1a4a8a;
      border-radius: 7px;
      padding: 6px 8px;
      font-size: 14px;
      text-align: center;
      outline: none;
    }
    #page-jump input:focus { border-color: #e94560; }
    #page-total { font-size: 13px; color: #777; white-space: nowrap; }

    /* ═══ RESUME BANNER ═══ */
    #resume-bar {
      display: none;
      background: #0d2137;
      border-bottom: 1px solid #1a4a8a;
      padding: 10px 16px;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      z-index: 190;
    }
    #resume-bar.on { display: flex; }
    #resume-bar p { font-size: 14px; color: #aac4e0; flex: 1; min-width: 160px; }
    #resume-bar p strong { color: #eee; }
    .rb-btn {
      border: none;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    #rb-yes { background: #e94560; color: white; }
    #rb-yes:active { opacity: 0.8; }
    #rb-no  { background: #0f3460; color: #aaa; }
    #rb-no:active  { opacity: 0.8; }

    /* ═══ SCROLLABLE CONTENT ═══ */
    #content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 168px;
      -webkit-overflow-scrolling: touch;
      transition: padding-bottom 0.28s;
    }
    body.reading #content { padding-bottom: 48px; }

    /* Drop zone */
    #drop-zone {
      width: 100%;
      max-width: 500px;
      margin-top: 50px;
      border: 2px dashed #0f3460;
      border-radius: 16px;
      padding: 60px 30px;
      text-align: center;
      color: #555;
    }
    #drop-zone svg { margin-bottom: 16px; opacity: 0.4; }
    #drop-zone p { font-size: 16px; line-height: 1.7; }

    /* Canvas wrapper */
    #canvas-wrap {
      display: none;
      width: 100%;
      max-width: 800px;
    }
    #canvas-wrap.on { display: block; }

    #canvas-container {
      position: relative;
      width: 100%;
    }

    #pdf-canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.55);
    }

    #hl-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      border-radius: 8px;
    }

    #tap-hint {
      text-align: center;
      font-size: 12px;
      color: #333;
      margin-top: 8px;
    }

    /* ═══ SENTENCE TICKER ═══ */
    #ticker {
      position: fixed;
      left: 0; right: 0;
      bottom: 138px;
      background: rgba(10, 38, 75, 0.97);
      border-top: 1px solid #0f3460;
      padding: 8px 20px;
      font-size: 14px;
      color: #ccc;
      line-height: 1.5;
      text-align: center;
      backdrop-filter: blur(10px);
      display: none;
      z-index: 150;
      transition: bottom 0.28s;
    }
    body.reading #ticker { bottom: 0; }

    /* ═══ CONTROLS ═══ */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #16213e;
      border-top: 1px solid #0f3460;
      padding: 9px 12px 12px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.28s ease;
    }
    body.reading #controls { transform: translateY(110%); }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 7px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .cb {
      background: #0f3460;
      color: white;
      border: none;
      padding: 9px 13px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .cb:active  { background: #e94560; }
    .cb:disabled { opacity: 0.28; cursor: default; }
    .cb.playing { background: #c0392b; }
    .cb.paused  { background: #533483; }
    .cb.green   { background: #1a4a2a; }
    .cb.green:active { background: #27ae60; }

    #speed-lbl { font-size: 12px; color: #666; white-space: nowrap; }
    #speed-range {
      -webkit-appearance: none;
      width: 80px; height: 4px;
      background: #0f3460;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    #speed-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #e94560;
    }
    #voice-sel {
      background: #0f3460;
      color: white;
      border: none;
      padding: 7px 9px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      max-width: 148px;
    }

    /* ═══ READING MODE FAB ═══ */
    #fab {
      display: none;
      position: fixed;
      top: 14px; right: 14px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(15, 52, 96, 0.88);
      border: 1px solid #1a4a8a;
      color: #ccc;
      font-size: 19px;
      cursor: pointer;
      z-index: 500;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 14px rgba(0,0,0,0.5);
    }
    body.reading #fab { display: flex; }

    /* ═══ BOOKMARKS SHEET ═══ */
    #bm-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 400;
    }
    #bm-bg.on { display: block; }
    #bm-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #16213e;
      border-radius: 18px 18px 0 0;
      border-top: 1px solid #0f3460;
      max-height: 72vh;
      display: flex;
      flex-direction: column;
    }
    #bm-head {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #bm-head h2 { font-size: 16px; font-weight: 600; flex: 1; }
    #bm-x { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; }
    #bm-items { overflow-y: auto; flex: 1; }
    .bm-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
      border-bottom: 1px solid #111827;
      cursor: pointer;
    }
    .bm-row:active { background: #0f3460; }
    .bm-ico { font-size: 20px; flex-shrink: 0; }
    .bm-txt { flex: 1; min-width: 0; }
    .bm-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bm-date { font-size: 11px; color: #666; margin-top: 2px; }
    .bm-del { background: none; border: none; color: #c0392b; font-size: 20px; cursor: pointer; padding: 4px 8px; }
    #bm-empty { padding: 40px 20px; text-align: center; color: #444; font-size: 14px; line-height: 1.6; }

    /* ═══ TOAST ═══ */
    #toast {
      position: fixed;
      top: 68px; left: 50%;
      transform: translateX(-50%);
      background: #0f3460;
      color: #eee;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 600;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid #1a4a8a;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <h1>📖 PDF Reader</h1>
  <button class="top-btn" onclick="document.getElementById('file-input').click()">Open PDF</button>
  <button class="top-btn sec" id="bm-btn"   onclick="openBM()"      disabled>🔖 Bookmarks</button>
  <button class="top-btn sec" id="focus-btn" onclick="enterReading()" disabled>⛶ Focus</button>
  <input type="file" id="file-input" accept="application/pdf" />
  <div id="page-jump">
    <input type="number" id="pg-input" min="1" placeholder="—"
           onkeydown="if(event.key==='Enter')jumpTo()"
           oninput="this.value=this.value.replace(/[^0-9]/,'')" />
    <button class="top-btn sec" onclick="jumpTo()">Go</button>
    <span id="page-total">/ —</span>
  </div>
</div>

<!-- Resume banner (shown when a saved position is found) -->
<div id="resume-bar">
  <p id="resume-msg">Resume where you left off?</p>
  <button class="rb-btn" id="rb-yes" onclick="doResume()">Resume</button>
  <button class="rb-btn" id="rb-no"  onclick="dismissResume()">Start fresh</button>
</div>

<!-- Reading-mode exit FAB -->
<button id="fab" onclick="exitReading()" title="Exit focus mode">⊟</button>

<!-- Scrollable content -->
<div id="content">
  <div id="drop-zone">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <p>Tap <strong>Open PDF</strong> above<br/>to load a file from your Files app</p>
  </div>

  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="hl-canvas"></canvas>
    </div>
    <div id="tap-hint">👆 Tap any sentence to start reading from there</div>
  </div>
</div>

<!-- Sentence ticker -->
<div id="ticker"></div>

<!-- Controls -->
<div id="controls">
  <div class="ctrl-row">
    <button class="cb" id="prev-pg"   onclick="changePage(-1)"  disabled>◀ Page</button>
    <button class="cb" id="prev-sent" onclick="moveSent(-1)"    disabled>⏮ Sent</button>
    <button class="cb" id="playb"     onclick="togglePlay()"    disabled>▶ Read</button>
    <button class="cb" id="next-sent" onclick="moveSent(1)"     disabled>Sent ⏭</button>
    <button class="cb" id="next-pg"   onclick="changePage(1)"   disabled>Page ▶</button>
    <button class="cb green" id="saveb" onclick="addBM()"       disabled>🔖 Save</button>
  </div>
  <div class="ctrl-row">
    <span id="speed-lbl">Speed: <strong id="speed-val">1.0×</strong></span>
    <input type="range" id="speed-range" min="0.5" max="2.5" step="0.1" value="1"
           oninput="setSpeed(this.value)" />
    <select id="voice-sel" onchange="setVoice(this.value)">
      <option value="">Default Voice</option>
    </select>
  </div>
</div>

<!-- Bookmarks sheet -->
<div id="bm-bg" onclick="if(event.target===this)closeBM()">
  <div id="bm-sheet">
    <div id="bm-head">
      <h2>🔖 Bookmarks</h2>
      <button id="bm-x" onclick="closeBM()">✕</button>
    </div>
    <div id="bm-items"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────
// SETUP
// ─────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PAGE_SCALE = 2;

// DOM refs
const pdfCanvas = document.getElementById('pdf-canvas');
const hlCanvas  = document.getElementById('hl-canvas');
const pdfCtx    = pdfCanvas.getContext('2d');
const hlCtx     = hlCanvas.getContext('2d');
const content   = document.getElementById('content');
const canvasWrap= document.getElementById('canvas-wrap');
const ticker    = document.getElementById('ticker');
const playb     = document.getElementById('playb');

// App state
let pdf         = null;
let numPages    = 0;
let fileName    = '';
let curPage     = 1;
let viewport    = null;
let sentences   = [];
let sentRects   = [];

let curSent     = -1;
let mode        = 'stopped';   // 'stopped' | 'speaking' | 'paused'
let pausePage   = 1;
let pauseSent   = 0;
let rate        = 1.0;
let voice       = null;

// Pending resume position (set when user opens PDF that has saved pos)
let pendingResume = null;

// ─────────────────────────────────────────────────────
// VOICES
// ─────────────────────────────────────────────────────
function refreshVoices() {
  const vs  = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  const sel = document.getElementById('voice-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Default Voice</option>';
  vs.forEach((v, i) => {
    const o = document.createElement('option');
    o.value = i;  o.textContent = v.name;
    sel.appendChild(o);
  });
  if (cur) sel.value = cur;
}
speechSynthesis.onvoiceschanged = refreshVoices;
refreshVoices();

function setVoice(i) {
  const vs = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  voice = i !== '' ? vs[parseInt(i)] : null;
}

// ─────────────────────────────────────────────────────
// FILE LOAD
// ─────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  fileName = f.name;
  const r  = new FileReader();
  r.onload = ev => initPDF(ev.target.result);
  r.readAsArrayBuffer(f);
  e.target.value = '';
});

async function initPDF(data) {
  hardStop();
  dismissResume();

  pdf      = await pdfjsLib.getDocument({ data }).promise;
  numPages = pdf.numPages;
  curPage  = 1;
  curSent  = 0;
  pausePage = 1;
  pauseSent = 0;

  // Show UI
  document.getElementById('drop-zone').style.display = 'none';
  canvasWrap.classList.add('on');
  document.getElementById('page-jump').classList.add('on');
  document.getElementById('page-total').textContent = `/ ${numPages}`;
  document.getElementById('bm-btn').disabled   = false;
  document.getElementById('focus-btn').disabled = false;
  enableControls();

  // Render first page
  await renderPage(1);

  // Check for a saved position for this file
  checkSavedPosition();
}

// ─────────────────────────────────────────────────────
// RENDER PAGE
// ─────────────────────────────────────────────────────
async function renderPage(n) {
  const page = await pdf.getPage(n);
  viewport   = page.getViewport({ scale: PAGE_SCALE });

  pdfCanvas.width  = viewport.width;
  pdfCanvas.height = viewport.height;
  hlCanvas.width   = viewport.width;
  hlCanvas.height  = viewport.height;

  await page.render({ canvasContext: pdfCtx, viewport }).promise;

  const tc = await page.getTextContent();
  buildSentences(tc.items);

  curPage = n;
  document.getElementById('pg-input').value = n;
  document.getElementById('prev-pg').disabled = n <= 1;
  document.getElementById('next-pg').disabled = n >= numPages;

  clearHL();
  content.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────
// SENTENCE PARSING
// ─────────────────────────────────────────────────────
function buildSentences(items) {
  let txt = '', map = [];

  items.forEach((item, i) => {
    if (!item.str?.trim()) return;
    const s = txt.length;
    txt += item.str + ' ';
    map.push({ s, e: txt.length, i });
  });

  const rx     = /[^.!?…\n]+(?:[.!?…]+["']?(?=\s|$)|\n)|[^.!?…\n]+$/g;
  const chunks = txt.match(rx) || [txt];
  sentences    = [];
  sentRects    = [];
  let cur      = 0;

  chunks.forEach(raw => {
    const text = raw.trim();
    if (!text) { cur += raw.length; return; }
    const a    = cur, b = cur + raw.length;
    const hits = map.filter(m => m.e > a && m.s < b);
    sentences.push({ text });

    if (hits.length) {
      const rs = hits.map(m => itemRect(items[m.i]));
      sentRects.push({
        x: Math.min(...rs.map(r => r.x)),
        y: Math.min(...rs.map(r => r.y)),
        w: Math.max(...rs.map(r => r.x + r.w)) - Math.min(...rs.map(r => r.x)),
        h: Math.max(...rs.map(r => r.y + r.h)) - Math.min(...rs.map(r => r.y))
      });
    } else {
      sentRects.push(null);
    }
    cur = b;
  });
}

function itemRect(item) {
  const [,,,sy,tx,ty] = item.transform;
  const h = Math.abs(sy);
  return {
    x: tx * viewport.scale,
    y: (viewport.height / viewport.scale - ty) * viewport.scale - h * viewport.scale,
    w: (item.width || 40) * viewport.scale,
    h: h * viewport.scale + 4
  };
}

// ─────────────────────────────────────────────────────
// TAP TO POSITION
// ─────────────────────────────────────────────────────
hlCanvas.addEventListener('click', onTap);
hlCanvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  onTap({ clientX: t.clientX, clientY: t.clientY });
}, { passive: false });

function onTap(e) {
  if (!sentences.length) return;
  const r  = hlCanvas.getBoundingClientRect();
  const sx = hlCanvas.width  / r.width;
  const sy = hlCanvas.height / r.height;
  const cx = (e.clientX - r.left) * sx;
  const cy = (e.clientY - r.top)  * sy;

  let found = -1;
  for (let i = 0; i < sentRects.length; i++) {
    const rc = sentRects[i];
    if (!rc) continue;
    if (cx >= rc.x - 8 && cx <= rc.x + rc.w + 8 &&
        cy >= rc.y - 8 && cy <= rc.y + rc.h + 8) { found = i; break; }
  }
  if (found < 0) return;

  const wasPlaying = mode === 'speaking';
  cancelTTS();

  curSent   = found;
  pausePage = curPage;
  pauseSent = found;
  mode      = 'paused';

  clearHL();
  drawHL(found);
  showTicker(sentences[found].text);
  updateBtn();
  savePosition();

  if (wasPlaying) startFrom(curPage, found);
  else toast('Tap ▶ Resume to read from here');
}

// ─────────────────────────────────────────────────────
// HIGHLIGHT
// ─────────────────────────────────────────────────────
function clearHL() {
  hlCtx.clearRect(0, 0, hlCanvas.width, hlCanvas.height);
}

function drawHL(si) {
  clearHL();
  const r = sentRects[si];
  if (!r) return;
  const pad = 5;
  hlCtx.fillStyle   = 'rgba(249,202,36,0.28)';
  hlCtx.strokeStyle = 'rgba(249,202,36,0.88)';
  hlCtx.lineWidth   = 2.5;
  hlCtx.beginPath();
  hlCtx.roundRect(r.x - pad, r.y - pad, r.w + pad * 2, r.h + pad * 2, 6);
  hlCtx.fill();
  hlCtx.stroke();

  // Scroll highlighted sentence into view within #content
  const hlRect     = hlCanvas.getBoundingClientRect();
  const scale      = hlRect.height / hlCanvas.height;
  const sentTop    = hlRect.top + r.y * scale;
  const cRect      = content.getBoundingClientRect();
  const target     = content.scrollTop + (sentTop - cRect.top) - content.clientHeight * 0.38;
  content.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
}

function showTicker(text) {
  ticker.style.display = 'block';
  ticker.textContent   = text;
}

// ─────────────────────────────────────────────────────
// SPEECH — PLAY / PAUSE / RESUME
// ─────────────────────────────────────────────────────
function togglePlay() {
  if (mode === 'speaking') {
    // PAUSE: remember exactly where we are
    pausePage = curPage;
    pauseSent = curSent;
    mode      = 'paused';
    cancelTTS();
    updateBtn();
    savePosition();
    toast('Paused — tap ▶ to resume');

  } else if (mode === 'paused') {
    // RESUME from saved position
    startFrom(pausePage, pauseSent);

  } else {
    // STOPPED: start from current sentence highlight or beginning of page
    startFrom(curPage, Math.max(0, curSent));
  }
}

function startFrom(pg, si) {
  if (pg !== curPage) {
    renderPage(pg).then(() => {
      mode = 'speaking';
      updateBtn();
      ticker.style.display = 'block';
      speakAt(si);
    });
  } else {
    mode = 'speaking';
    updateBtn();
    ticker.style.display = 'block';
    speakAt(si);
  }
}

function speakAt(si) {
  if (mode !== 'speaking') return;

  // End of page → go to next
  if (si >= sentences.length) {
    if (curPage < numPages) {
      renderPage(curPage + 1).then(() => {
        if (mode === 'speaking') speakAt(0);
      });
    } else {
      hardStop();
      toast('Finished reading 🎉');
    }
    return;
  }

  curSent = si;
  clearHL();
  drawHL(si);
  showTicker(sentences[si].text);
  savePosition();  // auto-save as we read

  const u   = new SpeechSynthesisUtterance(sentences[si].text);
  u.rate    = rate;
  u.pitch   = 1;
  if (voice) u.voice = voice;
  u.onend   = () => { if (mode === 'speaking') speakAt(si + 1); };
  u.onerror = err => {
    if (err.error !== 'interrupted' && mode === 'speaking') speakAt(si + 1);
  };
  speechSynthesis.speak(u);
}

function cancelTTS() { speechSynthesis.cancel(); }

function hardStop() {
  cancelTTS();
  mode    = 'stopped';
  curSent = -1;
  clearHL();
  ticker.style.display = 'none';
  updateBtn();
}

function updateBtn() {
  if (mode === 'speaking') {
    playb.textContent = '⏸ Pause';
    playb.className   = 'cb playing';
  } else if (mode === 'paused') {
    playb.textContent = '▶ Resume';
    playb.className   = 'cb paused';
  } else {
    playb.textContent = '▶ Read';
    playb.className   = 'cb';
  }
  playb.disabled = false;
}

// ─────────────────────────────────────────────────────
// SENTENCE NAVIGATION
// ─────────────────────────────────────────────────────
function moveSent(delta) {
  const wasPlaying = mode === 'speaking';
  cancelTTS();

  let si = (curSent >= 0 ? curSent : 0) + delta;

  // Cross page boundaries
  if (si < 0) {
    if (curPage > 1) {
      mode = wasPlaying ? 'speaking' : 'paused';
      updateBtn();
      renderPage(curPage - 1).then(() => {
        si = sentences.length - 1;
        curSent = si;
        pausePage = curPage; pauseSent = si;
        clearHL(); drawHL(si); showTicker(sentences[si].text);
        savePosition();
        if (wasPlaying) speakAt(si);
        else updateBtn();
      });
      return;
    }
    si = 0;
  } else if (si >= sentences.length) {
    if (curPage < numPages) {
      mode = wasPlaying ? 'speaking' : 'paused';
      updateBtn();
      renderPage(curPage + 1).then(() => {
        curSent = 0;
        pausePage = curPage; pauseSent = 0;
        clearHL(); drawHL(0); showTicker(sentences[0].text);
        savePosition();
        if (wasPlaying) speakAt(0);
        else updateBtn();
      });
      return;
    }
    si = sentences.length - 1;
  }

  curSent   = si;
  pausePage = curPage;
  pauseSent = si;
  mode      = wasPlaying ? 'speaking' : 'paused';

  clearHL();
  drawHL(si);
  showTicker(sentences[si].text);
  savePosition();
  updateBtn();

  if (wasPlaying) speakAt(si);
}

// ─────────────────────────────────────────────────────
// PAGE NAVIGATION
// ─────────────────────────────────────────────────────
async function changePage(delta) {
  const next = curPage + delta;
  if (next < 1 || next > numPages) return;
  const wasPlaying = mode === 'speaking';
  hardStop();
  await renderPage(next);
  curSent   = 0;
  pausePage = next;
  pauseSent = 0;
  mode      = 'paused';
  clearHL();
  drawHL(0);
  showTicker(sentences[0]?.text || '');
  savePosition();
  updateBtn();
  if (wasPlaying) startFrom(next, 0);
}

function jumpTo() {
  let n = parseInt(document.getElementById('pg-input').value);
  if (isNaN(n)) return;
  n = Math.max(1, Math.min(n, numPages));
  if (n === curPage) return;
  changePage(n - curPage);
}

// ─────────────────────────────────────────────────────
// SPEED
// ─────────────────────────────────────────────────────
function setSpeed(v) {
  rate = parseFloat(v);
  document.getElementById('speed-val').textContent = rate.toFixed(1) + '×';
  if (mode === 'speaking') {
    const si = curSent;
    cancelTTS();
    mode = 'speaking';
    speakAt(si);
  }
}

// ─────────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────────
function enableControls() {
  ['playb','prev-pg','next-pg','prev-sent','next-sent','saveb']
    .forEach(id => document.getElementById(id).disabled = false);
}

// ─────────────────────────────────────────────────────
// AUTO-SAVE POSITION  (localStorage, keyed by filename)
// ─────────────────────────────────────────────────────
const posKey = () => 'pos:' + fileName;

function savePosition() {
  if (!pdf) return;
  try {
    localStorage.setItem(posKey(), JSON.stringify({
      page: curPage,
      sent: Math.max(0, curSent),
      ts:   Date.now()
    }));
  } catch(e) {}
}

// Save when tab is hidden or closed
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') savePosition();
});
window.addEventListener('beforeunload', savePosition);

function checkSavedPosition() {
  try {
    const raw = localStorage.getItem(posKey());
    if (!raw) return;
    const pos = JSON.parse(raw);
    // Only offer resume if it's not the very start
    if (!pos || (pos.page === 1 && pos.sent === 0)) return;

    pendingResume = pos;
    const date    = new Date(pos.ts).toLocaleDateString(undefined,
      { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    document.getElementById('resume-msg').innerHTML =
      `Last read <strong>page ${pos.page}</strong> on ${date} — continue from there?`;
    document.getElementById('resume-bar').classList.add('on');
  } catch(e) {}
}

async function doResume() {
  if (!pendingResume) return;
  dismissResume();

  const { page, sent } = pendingResume;
  pendingResume = null;

  await renderPage(page);
  curSent   = sent;
  pausePage = page;
  pauseSent = sent;
  mode      = 'paused';

  // Draw highlight at saved sentence (if it exists on this page)
  if (sent >= 0 && sent < sentences.length) {
    clearHL();
    drawHL(sent);
    showTicker(sentences[sent].text);
  }
  updateBtn();
  toast(`Resumed at page ${page} ✓`);
}

function dismissResume() {
  pendingResume = null;
  document.getElementById('resume-bar').classList.remove('on');
}

// ─────────────────────────────────────────────────────
// READING MODE
// ─────────────────────────────────────────────────────
function enterReading() {
  document.body.classList.add('reading');
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
  toast('Tap ⊟ to exit focus mode');
}

function exitReading() {
  document.body.classList.remove('reading');
  if (document.exitFullscreen && document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.body.classList.remove('reading');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') exitReading();
});

// ─────────────────────────────────────────────────────
// BOOKMARKS  (localStorage, per filename)
// ─────────────────────────────────────────────────────
const bmKey  = () => 'bm:' + fileName;
const getBMs = () => { try { return JSON.parse(localStorage.getItem(bmKey()) || '[]'); } catch { return []; } };
const putBMs = b  => localStorage.setItem(bmKey(), JSON.stringify(b));

function addBM() {
  if (!pdf) return;
  const si   = Math.max(0, curSent);
  const snip = sentences[si]?.text?.slice(0, 60) || `Page ${curPage}`;
  const label = `Page ${curPage} — "${snip}${snip.length >= 60 ? '…' : ''}"`;
  const bms  = getBMs();
  if (bms.find(b => b.page === curPage && b.si === si)) { toast('Already bookmarked!'); return; }
  bms.push({ page: curPage, si, label, ts: Date.now() });
  putBMs(bms);
  toast('Bookmark saved 🔖');
}

function openBM() {
  const bms   = getBMs();
  const items = document.getElementById('bm-items');
  items.innerHTML = '';

  if (!bms.length) {
    items.innerHTML = '<div id="bm-empty">No bookmarks yet.<br/>Tap 🔖 Save while reading to add one.</div>';
  } else {
    [...bms].reverse().forEach((bm, ri) => {
      const real = bms.length - 1 - ri;
      const row  = document.createElement('div');
      row.className = 'bm-row';
      row.innerHTML = `
        <div class="bm-ico">🔖</div>
        <div class="bm-txt">
          <div class="bm-name">${esc(bm.label)}</div>
          <div class="bm-date">${new Date(bm.ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}</div>
        </div>
        <button class="bm-del" onclick="delBM(${real},event)">✕</button>`;
      row.addEventListener('click', () => gotoBM(bm));
      items.appendChild(row);
    });
  }
  document.getElementById('bm-bg').classList.add('on');
}

function closeBM() { document.getElementById('bm-bg').classList.remove('on'); }

function gotoBM(bm) {
  closeBM();
  const wasPlaying = mode === 'speaking';
  hardStop();

  renderPage(bm.page).then(() => {
    const si  = Math.min(bm.si, sentences.length - 1);
    curSent   = si;
    pausePage = bm.page;
    pauseSent = si;
    mode      = 'paused';
    clearHL();
    drawHL(si);
    showTicker(sentences[si]?.text || '');
    savePosition();
    updateBtn();
    toast(`Jumped to page ${bm.page}`);
    if (wasPlaying) startFrom(bm.page, si);
  });
}

function delBM(i, e) {
  e.stopPropagation();
  const bms = getBMs();
  bms.splice(i, 1);
  putBMs(bms);
  openBM();
}

// ─────────────────────────────────────────────────────
// TOAST / UTILS
// ─────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2400);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
